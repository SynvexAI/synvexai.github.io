<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var redirectTarget =
        window.location.pathname + window.location.search + window.location.hash;
      window.location.replace("/?__redirect=" + encodeURIComponent(redirectTarget));
    })();
  </script>
</head>
<body>
  <noscript>
    <p>This page requires JavaScript. Open <a href="/">the homepage</a>.</p>
  </noscript>
</body>
</html>
